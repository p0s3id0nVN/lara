name: ⚡ Build Lara PSD
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: build
        run: |
          # 1. Khởi tạo tên file với ngày giờ build (Ví dụ: lara-PSD-20260413_110000.ipa)
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          IPA_NAME="lara-PSD-${TIMESTAMP}.ipa"
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV
          
          mkdir -p build
          xcodebuild \
            -project lara.xcodeproj \
            -scheme lara \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            archive \
            -archivePath $PWD/build/lara.xcarchive | xcbeautify || xcodebuild \
            -project lara.xcodeproj \
            -scheme lara \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            -archivePath $PWD/build/lara.xcarchive | tee build.log
      
          # 2. Kiểm tra App và đóng gói IPA
          APP_PATH="$PWD/build/lara.xcarchive/Products/Applications/lara.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Missing app at $APP_PATH"
            exit 1
          fi
          
          rm -rf "$PWD/build/Payload"
          mkdir -p "$PWD/build/Payload"
          cp -R "$APP_PATH" "$PWD/build/Payload/"
          
          # 3. Nén với tên file đã định nghĩa ở trên
          (cd "$PWD/build" && /usr/bin/zip -qry "$IPA_NAME" Payload)

      - name: upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lara-ipa
          path: |
            build/${{ env.IPA_NAME }}
            build.log

      - name: create release tag
        if: github.event_name != 'pull_request'
        id: tag
        run: |
          TAG="build_$(date +'%Y%m%d%H%M%S')-$(git rev-parse --short HEAD)"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: get last 12h commits
        if: github.event_name != 'pull_request'
        id: commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="No commits in the last 12 hours"
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # - name: delete old release
      #   if: github.event_name != 'pull_request'
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     script: |
      #       const releases = await github.rest.repos.listReleases({
      #         owner: context.repo.owner,
      #         repo: context.repo.repo
      #       });

      #       const latestRelease = releases.data.find(r => r.tag_name === 'latest');
      #       if (latestRelease) {
      #         await github.rest.repos.deleteRelease({
      #           owner: context.repo.owner,
      #           repo: context.repo.repo,
      #           release_id: latestRelease.id
      #         });
      #       }

      - name: create new release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: ${{ env.COMMITS }}
          files: build/${{ env.IPA_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}